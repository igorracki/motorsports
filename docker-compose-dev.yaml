services:
  backend:
    image: f1-backend:dev
    build:
      context: ./backend
      target: builder
    environment:
      - EXTERNAL_API_URL=http://fastf1_wrapper:8080/wrapper
      - SERVER_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml"

  fastf1_wrapper:
    image: f1-fastf1-wrapper:dev
    build:
      context: ./fastf1_wrapper
    ports:
      - "8080:8080"
    volumes:
      - ./fastf1_wrapper:/app
    working_dir: /app
    command: uvicorn src.core.http.server:server --host 0.0.0.0 --port 8080 --reload

  frontend:
    image: f1-frontend:dev
    build:
      context: ./frontend_remote/
    ports:
      - "3000:3000"
    volumes:
      - ./frontend_remote/v0-motorsport-event-landing-page:/app
      - /app/node_modules
    command: npm run dev -- -H 0.0.0.0
