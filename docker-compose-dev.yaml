services:
  backend:
    image: motorsports-backend:dev
    build:
      context: ./backend
      target: builder
    environment:
      - EXTERNAL_API_URL=http://fastf1_wrapper:8081/wrapper
      - SERVER_PORT=8080
      - JWT_SECRET=supersecret
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml"

  fastf1_wrapper:
    image: motorsports-fastf1-wrapper:dev
    build:
      context: ./fastf1_wrapper
    ports:
      - "8081:8081"
    volumes:
      - ./fastf1_wrapper:/app
      - motorsports_wrapper_cache_dev:/app/.cache
    working_dir: /app
    command: uvicorn src.core.http.server:server --host 0.0.0.0 --port 8081 --reload

  frontend:
    image: motorsports-frontend:dev
    build:
      context: ./frontend/
      target: deps
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- -H 0.0.0.0

volumes:
  motorsports_wrapper_cache_dev:

