services:

  fastf1_wrapper:
    image: sledzior/motorsports/fastf1_wrapper
    build:
      context: ./fastf1_wrapper
    ports:
      - "8081:8081"
    volumes:
      - motorsports_wrapper_cache:/app/.cache

  backend:
    image: sledzior/motorsports/backend
    environment:
      - EXTERNAL_API_URL=http://fastf1_wrapper:8081/wrapper
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-default_secret_for_development_only}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - DATABASE_PATH=/data/motorsports_data.db
    build:
      context: ./backend
    ports:
      - "8080:8080"
    volumes:
      - motorsports_db_data:/data

  frontend:
    image: sledzior/motorsports/frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
      - BACKEND_URL=http://backend:8080

volumes:
  motorsports_db_data:
  motorsports_wrapper_cache:
