openapi: 3.0.3
info:
  title: F1 Prediction League API
  description: API for fetching F1 data and managing user predictions.
  version: 1.0.0
servers:
  - url: /api
    description: Base API path
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /schedule/{year}:
    get:
      summary: Get race schedule for a year
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
            minimum: 1950
            maximum: 2100
      responses:
        '200':
          description: List of race weekends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /schedule/{year}/{round}/{session}/results:
    get:
      summary: Get session results
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: round
          in: path
          required: true
          schema:
            type: integer
        - name: session
          in: path
          required: true
          schema:
            type: string
            example: Race
      responses:
        '200':
          description: Session results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResults'
        '400':
          $ref: '#/components/responses/BadRequest'

  /schedule/{year}/{round}/circuit:
    get:
      summary: Get circuit details
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: round
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Circuit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Circuit'
        '404':
          description: Circuit not found
        '400':
          $ref: '#/components/responses/BadRequest'

  /schedule/{year}/{round}/drivers:
    get:
      summary: Get participating drivers for a round
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: round
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverInfo'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}:
    get:
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile and scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '404':
          description: User not found

  /users/{id}/predictions:
    get:
      summary: Get all predictions for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prediction'
    post:
      summary: Submit a prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Prediction'
      responses:
        '201':
          description: Prediction submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prediction'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}/predictions/{year}/{round}:
    get:
      summary: Get user predictions for a specific round
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: round
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of predictions for the round
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prediction'

  /users/friends/request:
    post:
      summary: Send a friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequestRequest'
      responses:
        '201':
          description: Friend request sent
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized

  /users/friends/requests:
    get:
      summary: Get pending friend requests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendRequest'
        '401':
          description: Unauthorized

  /users/friends/requests/{id}:
    put:
      summary: Handle a friend request (accept/deny)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandleFriendRequestRequest'
      responses:
        '200':
          description: Request handled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized

  /users/friends/leaderboard/{season}:
    get:
      summary: Get leaderboard for a season
      security:
        - bearerAuth: []
      parameters:
        - name: season
          in: path
          required: true
          schema:
            type: integer
            minimum: 1950
            maximum: 2100
      responses:
        '200':
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        user_id:
          type: string
        display_name:
          type: string

    UserScore:
      type: object
      properties:
        user_id:
          type: string
        score_type:
          type: string
        season:
          type: integer
          nullable: true
        value:
          type: integer
        updated_at:
          type: string
          format: date-time

    RegisterUserRequest:
      type: object
      required:
        - username
        - email
        - display_name
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string

    UserProfileResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/Profile'
        scores:
          type: array
          items:
            $ref: '#/components/schemas/UserScore'

    Prediction:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        year:
          type: integer
        round:
          type: integer
        session_type:
          type: string
        score:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: '#/components/schemas/PredictionEntry'

    PredictionEntry:
      type: object
      properties:
        prediction_id:
          type: string
        position:
          type: integer
        driver_id:
          type: string

    Session:
      type: object
      properties:
        type:
          type: string
        session_code:
          type: string
        time_local:
          type: string
        time_utc_ms:
          type: integer
          format: int64
        time_utc:
          type: string
        utc_offset_ms:
          type: integer
          format: int64

    RaceWeekend:
      type: object
      properties:
        round:
          type: integer
        full_name:
          type: string
        name:
          type: string
        location:
          type: string
        country:
          type: string
        country_code:
          type: string
        event_format:
          type: string
        start_date_local_ms:
          type: integer
          format: int64
        start_date_local:
          type: string
        start_date_utc_ms:
          type: integer
          format: int64
        start_date_utc:
          type: string
        end_date_local_ms:
          type: integer
          format: int64
        end_date_local:
          type: string
        end_date_utc_ms:
          type: integer
          format: int64
        end_date_utc:
          type: string
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'

    ScheduleResponse:
      type: object
      properties:
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/RaceWeekend'

    DriverInfo:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        full_name:
          type: string
        country_code:
          type: string
        team_name:
          type: string

    RaceDetails:
      type: object
      properties:
        grid_position:
          type: integer
        status:
          type: string
        positions_change:
          type: integer

    QualifyingDetails:
      type: object
      properties:
        q1_ms:
          type: integer
          format: int64
          nullable: true
        q1:
          type: string
        q2_ms:
          type: integer
          format: int64
          nullable: true
        q2:
          type: string
        q3_ms:
          type: integer
          format: int64
          nullable: true
        q3:
          type: string

    DriverResult:
      type: object
      properties:
        position:
          type: integer
        driver:
          $ref: '#/components/schemas/DriverInfo'
        laps:
          type: integer
        status:
          type: string
        total_time_ms:
          type: integer
          format: int64
          nullable: true
        total_time:
          type: string
        gap_ms:
          type: integer
          format: int64
          nullable: true
        gap:
          type: string
        fastest_lap_ms:
          type: integer
          format: int64
          nullable: true
        fastest_lap:
          type: string
        race_details:
          $ref: '#/components/schemas/RaceDetails'
        qualifying_details:
          $ref: '#/components/schemas/QualifyingDetails'

    SessionResults:
      type: object
      properties:
        year:
          type: integer
        round:
          type: integer
        session_type:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/DriverResult'

    CircuitLayoutPoint:
      type: object
      properties:
        x:
          type: number
          format: float
        y:
          type: number
          format: float

    Circuit:
      type: object
      properties:
        circuit_name:
          type: string
        location:
          type: string
        country:
          type: string
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        length_km:
          type: number
          format: float
          nullable: true
        corners:
          type: integer
          nullable: true
        layout:
          type: array
          items:
            $ref: '#/components/schemas/CircuitLayoutPoint'
        event_name:
          type: string
        event_date_ms:
          type: integer
          format: int64
        event_date:
          type: string
        rotation:
          type: number
          format: float
        max_speed_kmh:
          type: number
          format: float
        max_altitude_m:
          type: number
          format: float
        min_altitude_m:
          type: number
          format: float

    FriendRequest:
      type: object
      properties:
        id:
          type: string
        sender_id:
          type: string
        receiver_id:
          type: string
        status:
          type: string
          enum: [pending, accepted, denied]
        created_at:
          type: string
          format: date-time
        sender_email:
          type: string
        sender_name:
          type: string

    SendFriendRequestRequest:
      type: object
      required:
        - identifier
      properties:
        identifier:
          type: string
          description: User email or UUID

    HandleFriendRequestRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [accept, deny]

    LeaderboardEntry:
      type: object
      properties:
        position:
          type: integer
        user_id:
          type: string
        display_name:
          type: string
        score:
          type: integer
